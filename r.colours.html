<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Switcher Project</title>
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            /* Smoothly transitions the background color */
            transition: background-color 0.4s ease;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Meera's Color App</h1>
        <p>Click the button to generate a random RGB color!</p>
        <button onclick="changeBackgroundColor()">Change Color</button>
    </div>

    <script>
        function changeBackgroundColor() {
            // 1. Using Math.random and Math.floor as per instructions
            // We multiply by 256 to get a range from 0 to 255
            let r = Math.floor(Math.random() * 256);
            let g = Math.floor(Math.random() * 256);
            let b = Math.floor(Math.random() * 256);

            // 2. Create the RGB color string
            let randomRGB = "rgb(" + r + "," + g + "," + b + ")";

            // 3. Apply it to the body's background
            document.body.style.backgroundColor = randomRGB;

            // Log to console so you can see the numbers behind the scenes
            console.log("New Color Generated: " + randomRGB);
        }
    </script>

</body>
</html>
